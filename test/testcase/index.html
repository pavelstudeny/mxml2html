<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>MusicXML → HTML testcase</title>
  <link rel="stylesheet" href="../../src/css/musicxml.css"/>
  <script src="xslt-processor.global.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      font-size: 14px;
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100dvh;
    }

    header {
      padding: 8px 12px;
      background: #f0f0f0;
      border-bottom: 1px solid #ccc;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 14px; font-weight: 600; }

    .nav-btn {
      background: none;
      border: 1px solid #bbb;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 14px;
      cursor: pointer;
      line-height: 1.4;
      color: #333;
    }
    .nav-btn:hover:not(:disabled) { background: #e0e0e0; }
    .nav-btn:disabled { opacity: 0.35; cursor: default; }

    #status {
      font-size: 12px;
      color: #888;
    }

    main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
    }

    #input-pane {
      display: flex;
      flex-direction: column;
      border-right: 1px solid #ccc;
    }

    #input-pane label {
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #666;
      border-bottom: 1px solid #eee;
    }

    #xml-input {
      flex: 1;
      width: 100%;
      border: none;
      outline: none;
      resize: none;
      font-family: monospace;
      font-size: 12px;
      line-height: 1.5;
      padding: 10px;
      tab-size: 2;
    }

    #output-pane {
      display: flex;
      flex-direction: column;
      overflow: auto;
    }

    #output-pane label {
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #666;
      border-bottom: 1px solid #eee;
      position: sticky;
      top: 0;
      background: white;
    }

    #output {
      flex: 1;
      padding: 0 10px;
      font-size: 48px;
    }

    @media (prefers-color-scheme: dark) {
      header { background: #1e1e1e; border-color: #333; color: #ccc; }
      #input-pane { border-color: #333; }
      #input-pane label, #output-pane label { color: #888; border-color: #333; background: #111; }
      #xml-input { background: #111; color: #ccc; }
      #output-pane { background: #111; }
      #output-pane label { background: #111; }
      .nav-btn { border-color: #555; color: #ccc; }
      .nav-btn:hover:not(:disabled) { background: #2a2a2a; }
    }
  </style>
</head>
<body>

<header>
  <button class="nav-btn" id="btn-prev" disabled>&#8592;</button>
  <h1 id="title">…</h1>
  <button class="nav-btn" id="btn-next">&#8594;</button>
  <span id="status">loading…</span>
</header>

<main>
  <div id="input-pane">
    <label for="xml-input">MusicXML input</label>
    <textarea id="xml-input" spellcheck="false"></textarea>
  </div>

  <div id="output-pane">
    <label>HTML output</label>
    <div id="output"></div>
  </div>
</main>

<script type="module">
  const status  = document.getElementById('status');
  const titleEl = document.getElementById('title');
  const btnPrev = document.getElementById('btn-prev');
  const btnNext = document.getElementById('btn-next');
  const input   = document.getElementById('xml-input');
  const output  = document.getElementById('output');
  const parser  = new DOMParser();

  // Load and compile the XSLT stylesheet once.
  const xslt = new XsltProcessor.Xslt();
  let xsltTemplate = null;
  let currentDoc = parseInt(location.hash.slice(1)) || 1;
  let preloaded = null; // { n, text } for the next doc

  async function loadXslt() {
    const response = await fetch('../../src/xslt/timewise.xslt');
    const text = await response.text();
    xsltTemplate = XsltProcessor.domDocumentToXDocument(
      parser.parseFromString(text, 'text/xml')
    );
  }

  // Extract concatenated part names from a parsed XML document.
  function extractTitle(xmlDoc) {
    const names = [...xmlDoc.querySelectorAll('score-timewise part-list score-part part-name')]
      .map(el => el.textContent.trim())
      .filter(Boolean);
    return names.length ? names.join(' · ') : '(untitled)';
  }

  // Preload the next doc so the → button state is known and navigation is instant.
  function preloadNext(n) {
    preloaded = null;
    fetch(`${n}.musicxml`)
      .then(async r => {
        if (!r.ok) { btnNext.disabled = true; return; }
        const text = await r.text();
        preloaded = { n, text };
        btnNext.disabled = false;
      })
      .catch(() => { btnNext.disabled = true; });
  }

  // Load a numbered .musicxml file, populate the textarea, update the title and nav buttons.
  async function loadDoc(n, text = null) {
    if (!text) {
      const response = await fetch(`${n}.musicxml`);
      if (!response.ok) throw new Error(`${n}.musicxml not found`);
      text = await response.text();
    }
    currentDoc = n;
    location.hash = n;
    input.value = text;

    const xmlDoc = parser.parseFromString(text, 'text/xml');
    titleEl.textContent = extractTitle(xmlDoc);

    btnPrev.disabled = (currentDoc === 1);
    btnNext.disabled = true; // will be updated by preloadNext
    preloadNext(currentDoc + 1);

    await transform();
  }

  // Transform the current textarea content and update the output div.
  async function transform() {
    if (!xsltTemplate) return;

    const xmlText = input.value.trim();
    if (!xmlText) return;

    const xmlDoc = parser.parseFromString(xmlText, 'text/xml');
    if (xmlDoc.querySelector('parsererror')) {
      status.textContent = 'XML parse error — output unchanged';
      return;
    }

    let result;
    try {
      const resultStr = await xslt.xsltProcess(
        XsltProcessor.domDocumentToXDocument(xmlDoc),
        xsltTemplate
      );
      result = parser.parseFromString(resultStr, 'text/html');
    } catch (err) {
      status.textContent = `XSLT error: ${err.message}`;
      return;
    }

    const score = result.querySelector('.score');
    if (!score) {
      status.textContent = 'XSLT produced no .score element';
      return;
    }

    output.replaceChildren(document.adoptNode(score));
    status.textContent = 'OK';
  }

  input.addEventListener('input', () => {
    const xmlDoc = parser.parseFromString(input.value.trim(), 'text/xml');
    if (!xmlDoc.querySelector('parsererror')) {
      titleEl.textContent = extractTitle(xmlDoc);
    }
    transform();
  });

  addEventListener('hashchange', () => {
    const n = parseInt(location.hash.slice(1));
    if (n && n !== currentDoc) loadDoc(n).catch(err => { status.textContent = `Error: ${err.message}`; });
  });

  btnPrev.addEventListener('click', () => loadDoc(currentDoc - 1).catch(err => { status.textContent = `Error: ${err.message}`; }));
  btnNext.addEventListener('click', () => {
    const next = currentDoc + 1;
    const text = preloaded?.n === next ? preloaded.text : null;
    loadDoc(next, text).catch(err => { status.textContent = `Error: ${err.message}`; });
  });

  status.textContent = 'loading XSLT…';
  loadXslt()
    .then(() => loadDoc(currentDoc))
    .catch(err => { status.textContent = `Error: ${err.message}`; });
</script>

</body>
</html>
