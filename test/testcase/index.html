<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>MusicXML → HTML testcase</title>
  <link rel="stylesheet" href="../../src/css/musicxml.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      font-size: 14px;
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100dvh;
    }

    header {
      padding: 8px 12px;
      background: #f0f0f0;
      border-bottom: 1px solid #ccc;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 14px; font-weight: 600; }

    #status {
      font-size: 12px;
      color: #888;
    }

    main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
    }

    #input-pane {
      display: flex;
      flex-direction: column;
      border-right: 1px solid #ccc;
    }

    #input-pane label {
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #666;
      border-bottom: 1px solid #eee;
    }

    #xml-input {
      flex: 1;
      width: 100%;
      border: none;
      outline: none;
      resize: none;
      font-family: monospace;
      font-size: 12px;
      line-height: 1.5;
      padding: 10px;
      tab-size: 2;
    }

    #output-pane {
      display: flex;
      flex-direction: column;
      overflow: auto;
    }

    #output-pane label {
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #666;
      border-bottom: 1px solid #eee;
      position: sticky;
      top: 0;
      background: white;
    }

    #output {
      flex: 1;
      padding: 0 10px;
      font-size: 48px;
    }

    @media (prefers-color-scheme: dark) {
      header { background: #1e1e1e; border-color: #333; color: #ccc; }
      #input-pane { border-color: #333; }
      #input-pane label, #output-pane label { color: #888; border-color: #333; background: #111; }
      #xml-input { background: #111; color: #ccc; }
      #output-pane { background: #111; }
      #output-pane label { background: #111; }
    }
  </style>
</head>
<body>

<header>
  <h1>MusicXML → HTML</h1>
  <span id="status">loading XSLT…</span>
</header>

<main>
  <div id="input-pane">
    <label for="xml-input">MusicXML input</label>
    <textarea id="xml-input" spellcheck="false"><?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE score-timewise PUBLIC
  "-//Recordare//DTD MusicXML 4.0 Timewise//EN"
  "http://www.musicxml.org/dtds/timewise.dtd">
<score-timewise version="4.0">
  <part-list>
    <score-part id="P1">
      <part-name>Piano</part-name>
    </score-part>
  </part-list>
  <measure number="1">
    <part id="P1">
      <attributes>
        <divisions>4</divisions>
        <key><fifths>0</fifths><mode>major</mode></key>
        <time><beats>4</beats><beat-type>4</beat-type></time>
        <clef><sign>G</sign><line>2</line></clef>
      </attributes>
      <note>
        <pitch><step>D</step><octave>4</octave></pitch>
        <duration>4</duration>
        <type>quarter</type>
      </note>
      <note>
        <pitch><step>E</step><octave>4</octave></pitch>
        <duration>4</duration>
        <type>quarter</type>
      </note>
      <note>
        <pitch><step>F</step><octave>4</octave></pitch>
        <duration>4</duration>
        <type>quarter</type>
      </note>
      <note>
        <pitch><step>G</step><octave>4</octave></pitch>
        <duration>4</duration>
        <type>quarter</type>
      </note>
    </part>
  </measure>
  <measure number="2">
    <part id="P1">
      <note>
        <pitch><step>A</step><octave>4</octave></pitch>
        <duration>8</duration>
        <type>half</type>
      </note>
      <note>
        <rest/>
        <duration>4</duration>
        <type>quarter</type>
      </note>
      <note>
        <pitch><step>D</step><octave>4</octave></pitch>
        <duration>4</duration>
        <type>quarter</type>
      </note>
    </part>
  </measure>
</score-timewise></textarea>
  </div>

  <div id="output-pane">
    <label>HTML output</label>
    <div id="output"></div>
  </div>
</main>

<script type="module">
  const status  = document.getElementById('status');
  const input   = document.getElementById('xml-input');
  const output  = document.getElementById('output');

  // Load and compile the XSLT stylesheet once.
  let processor = null;

  async function loadXslt() {
    const response = await fetch('../../src/xslt/timewise.xslt');
    if (!response.ok) throw new Error(`Failed to fetch XSLT: ${response.status}`);
    const text = await response.text();
    const xsltDoc = new DOMParser().parseFromString(text, 'text/xml');
    processor = new XSLTProcessor();
    processor.importStylesheet(xsltDoc);
  }

  // Transform the current textarea content and update the output div.
  function transform() {
    if (!processor) return;

    const xmlText = input.value.trim();
    if (!xmlText) return;

    const xmlDoc = new DOMParser().parseFromString(xmlText, 'text/xml');
    // DOMParser signals parse errors via a <parsererror> element.
    if (xmlDoc.querySelector('parsererror')) {
      status.textContent = 'XML parse error — output unchanged';
      return;
    }

    let result;
    try {
      result = processor.transformToDocument(xmlDoc);
    } catch (err) {
      status.textContent = `XSLT error: ${err.message}`;
      return;
    }

    const score = result.querySelector('.score');
    if (!score) {
      status.textContent = 'XSLT produced no .score element';
      return;
    }

    output.replaceChildren(document.adoptNode(score));
    status.textContent = 'OK';
  }

  input.addEventListener('input', transform);

  loadXslt()
    .then(() => {
      status.textContent = 'XSLT loaded';
      transform();
    })
    .catch(err => {
      status.textContent = `Error: ${err.message}`;
    });
</script>

</body>
</html>
